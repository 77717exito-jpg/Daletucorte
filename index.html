  <title>Dale Tu Corte — Ropa Premium de Chile</title>
  <script src="https://cdn.tailwindcss.com"><\/script>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: { brand:'#111', panel:'#F5F5F5', border:'#E0E0E0', muted:'#888', accent:'#C8960C' },
          fontFamily: { display:['"Bebas Neue"','cursive'], body:['"DM Sans"','sans-serif'] },
          keyframes: { marquee:{'0%':{transform:'translateX(0)'},'100%':{transform:'translateX(-50%)'}} },
          animation: { marquee:'marquee 28s linear infinite' },
        },
      },
    };
  <\/script>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html{scroll-behavior:smooth}
    body{background:#fff;color:#111;font-family:'DM Sans',sans-serif;overflow-x:hidden}
    .reveal{opacity:0;transform:translateY(36px);transition:opacity .65s ease,transform .65s ease}
    .reveal.visible{opacity:1;transform:translateY(0)}
    #navbar{background:rgba(255,255,255,.9);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border-bottom:1px solid #E0E0E0;transition:background .3s}
    .product-card{transition:transform .4s cubic-bezier(.25,.8,.25,1),box-shadow .4s}
    .product-card:hover{transform:scale(1.04) translateY(-5px);box-shadow:0 24px 48px rgba(0,0,0,.15),0 0 0 1.5px #111}
    .product-card:hover .btn-wa{opacity:1;transform:translateY(0)}
    .btn-wa{opacity:0;transform:translateY(10px);transition:opacity .3s,transform .3s}
    .marquee-track{display:flex;width:max-content;align-items:center}
    .mlogo{display:inline-flex;align-items:center;padding:0 32px;font-weight:700;color:#bbb;white-space:nowrap;transition:color .3s;cursor:default;border-right:1px solid #E0E0E0}
    .mlogo:hover{color:#111}
    input:focus,textarea:focus{outline:none;border-color:#111!important;box-shadow:0 0 0 2px rgba(0,0,0,.07)}
    ::-webkit-scrollbar{width:3px}
    ::-webkit-scrollbar-thumb{background:#111;border-radius:99px}
    #mob-menu{transition:max-height .3s ease,opacity .3s ease;overflow:hidden}
    #mob-menu.closed{max-height:0;opacity:0}
    #mob-menu.open{max-height:300px;opacity:1}
    .badge{position:absolute;top:10px;left:10px;background:#111;color:#fff;font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;padding:3px 8px}
  </style>
</head>

<script>
  const obs = new IntersectionObserver(entries => {
    entries.forEach(e => { if(e.isIntersecting){ e.target.classList.add('visible'); obs.unobserve(e.target); } });
  }, {threshold:0.08});
  document.querySelectorAll('.reveal').forEach(el => obs.observe(el));
  window.addEventListener('load', () => {
    document.querySelectorAll('.reveal').forEach(el => {
      if(el.getBoundingClientRect().top < window.innerHeight) el.classList.add('visible');
    });
  });
  window.addEventListener('scroll', () => {
    document.getElementById('navbar').style.background =
      window.scrollY > 50 ? 'rgba(255,255,255,.98)' : 'rgba(255,255,255,.90)';
  }, {passive:true});
  const hamBtn = document.getElementById('ham-btn');
  const mobMenu = document.getElementById('mob-menu');
  let open = false;
  hamBtn.addEventListener('click', () => {
    open = !open;
    mobMenu.classList.toggle('closed',!open);
    mobMenu.classList.toggle('open',open);
    const [l0,l1,l2] = hamBtn.querySelectorAll('.hline');
    l0.style.transform = open ? 'translateY(7px) rotate(45deg)' : '';
    l1.style.transform = open ? 'translateY(-1px) rotate(-45deg)' : '';
    l2.style.opacity   = open ? '0' : '1';
  });
  document.querySelectorAll('.mlink').forEach(l => l.addEventListener('click', () => {
    open=false; mobMenu.classList.add('closed'); mobMenu.classList.remove('open');
    hamBtn.querySelectorAll('.hline').forEach(x=>{x.style.transform='';x.style.opacity='1';});
  }));
  document.getElementById('cform').addEventListener('submit', e => {
    e.preventDefault();
    const btn=e.target.querySelector('button');
    const msg=document.getElementById('fmsg');
    btn.disabled=true; btn.textContent='Enviando…';
    setTimeout(()=>{
      e.target.reset();
      msg.textContent='✓ ¡Consulta enviada! Te respondemos pronto.';
      msg.classList.remove('hidden');
      btn.disabled=false; btn.innerHTML='<span>Enviar Consulta</span><span>→</span>';
      setTimeout(()=>msg.classList.add('hidden'),5000);
    },1500);
  });
<\/script>
