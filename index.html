  <title>Dale Tu Corte — Ropa Premium de Chile</title>
  <script src="https://cdn.tailwindcss.com"><\/script>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: { brand:"#111", panel:"#F5F5F5", border:"#E0E0E0", muted:"#888", accent:"#C8960C" },
          fontFamily: { display:['"Bebas Neue"','cursive'], body:['"DM Sans"','sans-serif'] },
          keyframes: { marquee:{"0%":{transform:"translateX(0)"},"100%":{transform:"translateX(-50%)"}} },
          animation: { marquee:"marquee 28s linear infinite" },
        },
      },
    };
  <\/script>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html{scroll-behavior:smooth}
    body{background:#fff;color:#111;font-family:"DM Sans",sans-serif;overflow-x:hidden}
    .reveal{opacity:0;transform:translateY(30px);transition:opacity .6s ease,transform .6s ease}
    .reveal.visible{opacity:1;transform:translateY(0)}
    #navbar{background:rgba(255,255,255,.92);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border-bottom:1px solid #E0E0E0;transition:background .3s}
    .pcard{transition:transform .35s ease,box-shadow .35s ease}
    .pcard:hover{transform:scale(1.03) translateY(-4px);box-shadow:0 20px 40px rgba(0,0,0,.13),0 0 0 1.5px #111}
    .pcard:hover .bwa{opacity:1;transform:translateY(0)}
    .bwa{opacity:0;transform:translateY(8px);transition:opacity .3s,transform .3s}
    .mtrack{display:flex;width:max-content;align-items:center}
    .ml{display:inline-flex;align-items:center;padding:0 28px;font-weight:700;color:#bbb;white-space:nowrap;transition:color .3s;border-right:1px solid #E0E0E0;height:48px}
    .ml:hover{color:#111}
    input:focus,textarea:focus{outline:none;border-color:#111!important;box-shadow:0 0 0 2px rgba(0,0,0,.07)}
    ::-webkit-scrollbar{width:3px}
    ::-webkit-scrollbar-thumb{background:#111;border-radius:99px}
    #mmenu{transition:max-height .3s,opacity .3s;overflow:hidden}
    #mmenu.closed{max-height:0;opacity:0}
    #mmenu.open{max-height:300px;opacity:1}
    .badge{position:absolute;top:8px;left:8px;background:#111;color:#fff;font-size:9px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;padding:3px 7px}
  </style>
</head>

<script>
  const obs=new IntersectionObserver(e=>{e.forEach(x=>{if(x.isIntersecting){x.target.classList.add("visible");obs.unobserve(x.target);}});},{threshold:.07});
  document.querySelectorAll(".reveal").forEach(el=>obs.observe(el));
  window.addEventListener("load",()=>{document.querySelectorAll(".reveal").forEach(el=>{if(el.getBoundingClientRect().top<window.innerHeight)el.classList.add("visible");});});
  window.addEventListener("scroll",()=>{document.getElementById("navbar").style.background=window.scrollY>50?"rgba(255,255,255,.98)":"rgba(255,255,255,.92)";},{passive:true});
  const hbtn=document.getElementById("hbtn"),mmenu=document.getElementById("mmenu");
  let open=false;
  hbtn.addEventListener("click",()=>{open=!open;mmenu.classList.toggle("closed",!open);mmenu.classList.toggle("open",open);const[l0,l1,l2]=hbtn.querySelectorAll(".hl");l0.style.transform=open?"translateY(7px) rotate(45deg)":"";l1.style.transform=open?"translateY(-1px) rotate(-45deg)":"";l2.style.opacity=open?"0":"1";});
  document.querySelectorAll(".ml-link").forEach(l=>l.addEventListener("click",()=>{open=false;mmenu.classList.add("closed");mmenu.classList.remove("open");hbtn.querySelectorAll(".hl").forEach(x=>{x.style.transform="";x.style.opacity="1";});}));
  document.getElementById("cform").addEventListener("submit",e=>{e.preventDefault();const btn=e.target.querySelector("button"),msg=document.getElementById("fmsg");btn.disabled=true;btn.textContent="Enviando…";setTimeout(()=>{e.target.reset();msg.textContent="✓ ¡Consulta enviada! Te respondemos pronto.";msg.classList.remove("hidden");btn.disabled=false;btn.innerHTML="<span>Enviar Consulta</span><span>→</span>";setTimeout(()=>msg.classList.add("hidden"),5000);},1500);});
<\/script>
